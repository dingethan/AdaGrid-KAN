<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EcoGrow-KAN 实验控制台</title>
<style>
:root{
  --bg:#f5f7fb;--panel:#fff;--border:#d9dfeb;--text:#1f2937;--muted:#6b7280;
  --fixed:#4f6bed;--ada:#f97316;--eco:#10a37f;--trial:#d59e00;--reject:#e5484d;--blocked:#777;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
header{padding:24px 30px;background:#eef3ff;border-bottom:1px solid var(--border)}
h1{margin:0 0 8px;font-size:28px} h2{font-size:16px;margin:0 0 10px} h3{font-size:14px;margin:0 0 8px}
header p{margin:0;max-width:1100px;color:var(--muted);line-height:1.7}
.wrap{max-width:1540px;margin:0 auto;padding:18px 26px 30px}
.layout{display:grid;grid-template-columns:320px minmax(0,1fr) 360px;gap:14px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:14px}
.field{margin-bottom:10px}.field label{display:block;color:var(--muted);font-size:12px;margin-bottom:4px}
input,select{width:100%;border:1px solid #cbd3e1;border-radius:7px;padding:7px 8px;font:inherit;background:#fff}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
button{border:1px solid #cbd3e1;background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font:inherit}
button.primary{background:var(--eco);color:white;border-color:var(--eco)} button:disabled{opacity:.45;cursor:not-allowed}
.status{font-size:13px;color:var(--muted);line-height:1.6}.ok{color:var(--eco);font-weight:700}.bad{color:var(--reject);font-weight:700}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.metric{background:#f3f5f9;border:1px solid #e4e8f0;border-radius:8px;padding:9px}
.metric span{display:block;color:var(--muted);font-size:11px}.metric b{font-family:Consolas,monospace;font-size:14px}
.charts{display:flex;flex-direction:column;gap:14px}.chart-panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-bottom:6px}
svg{display:block;width:100%;height:auto}.axis text{fill:#6b7280;font-size:11px}.axis path,.axis line{stroke:#cbd3e1}
.event{padding:8px 9px;border-radius:8px;font-size:12px;margin-bottom:6px;border-left:4px solid #bbb;background:#f8fafc;line-height:1.45}
.event.accepted{border-color:var(--eco)}.event.trial{border-color:var(--trial)}.event.rejected{border-color:var(--reject)}.event.blocked{border-color:var(--blocked)}
.run-item{border:1px solid #e2e7f0;border-radius:8px;padding:9px;margin-bottom:8px;background:#fbfcff;font-size:12px}
.run-item label{display:flex;gap:7px;align-items:flex-start;color:var(--text)}.run-item input{width:auto;margin-top:2px}
.run-meta{color:var(--muted);line-height:1.5;margin-top:4px}.pill{display:inline-block;padding:2px 7px;border-radius:999px;font-weight:700;font-size:11px}
.pill.fixed{background:#e8edff;color:var(--fixed)}.pill.adagrid{background:#fff0e5;color:var(--ada)}.pill.ecogrow{background:#e8f8f3;color:var(--eco)}
.note{font-size:12px;color:var(--muted);line-height:1.6}.warning{color:var(--reject);font-size:12px;line-height:1.5}
@media(max-width:1180px){.layout{grid-template-columns:1fr}.panel{margin-bottom:12px}}
</style>
</head>
<body>
<header>
  <h1>EcoGrow-KAN 实验控制台</h1>
  <p>这个页面连接本地 FastAPI 后端，运行真实的 Python/PyTorch KAN 训练。你可以选择 Fixed、AdaGrid 或 EcoGrow 策略，实时查看训练指标，并勾选历史实验进行对比。</p>
</header>

<div class="wrap">
  <div class="layout">
    <aside>
      <section class="panel">
        <h2>后端环境</h2>
        <div id="healthBox" class="status">正在检查后端...</div>
      </section>

      <section class="panel">
        <h2>训练配置</h2>
        <div class="field"><label>Grid 策略</label><select id="strategy"><option value="ecogrow">EcoGrow-KAN</option><option value="adagrid">AdaGrid-KAN</option><option value="fixed">Fixed KAN</option></select></div>
        <div class="row">
          <div class="field"><label>Epochs</label><input id="epochs" type="number" value="700" min="1"></div>
          <div class="field"><label>Seed</label><input id="seed" type="number" value="42"></div>
        </div>
        <div class="row">
          <div class="field"><label>Noise std</label><input id="noise_std" type="number" value="0.15" step="0.01" min="0"></div>
          <div class="field"><label>Learning rate</label><input id="lr" type="number" value="0.03" step="0.001" min="0.0001"></div>
        </div>
        <div class="row">
          <div class="field"><label>Initial Grid</label><input id="initial_grid" type="number" value="3" min="1"></div>
          <div class="field"><label>Fixed Grid</label><input id="fixed_grid" type="number" value="12" min="1"></div>
        </div>
        <div class="row">
          <div class="field"><label>Max Grid</label><input id="max_grid" type="number" value="50" min="1"></div>
          <div class="field"><label>Patience</label><input id="patience" type="number" value="8" min="1"></div>
        </div>
        <div class="row">
          <div class="field"><label>Trial epochs</label><input id="trial_epochs" type="number" value="30" min="1"></div>
          <div class="field"><label>Weight decay</label><input id="weight_decay" type="number" value="0.00001" step="0.00001" min="0"></div>
        </div>
        <div class="row">
          <div class="field"><label>Min improvement</label><input id="min_improvement" type="number" value="0.01" step="0.001"></div>
          <div class="field"><label>Min efficiency</label><input id="min_efficiency" type="number" value="0.05" step="0.001"></div>
        </div>
        <button class="primary" id="startBtn" disabled>开始训练</button>
        <button id="refreshBtn">刷新历史</button>
        <p id="formError" class="warning"></p>
      </section>

      <section class="panel">
        <h2>当前指标</h2>
        <div class="metrics">
          <div class="metric"><span>Run</span><b id="mRun">-</b></div>
          <div class="metric"><span>Epoch</span><b id="mEpoch">0</b></div>
          <div class="metric"><span>Train Loss</span><b id="mTrain">-</b></div>
          <div class="metric"><span>Val Loss</span><b id="mVal">-</b></div>
          <div class="metric"><span>Grid</span><b id="mGrid">-</b></div>
          <div class="metric"><span>Params</span><b id="mParams">-</b></div>
        </div>
      </section>
    </aside>

    <main class="charts">
      <section class="chart-panel">
        <h2>训练 Loss</h2>
        <svg id="trainChart" viewBox="0 0 980 250"></svg>
      </section>
      <section class="chart-panel">
        <h2>验证集 Loss</h2>
        <svg id="valChart" viewBox="0 0 980 250"></svg>
      </section>
      <section class="chart-panel">
        <h2>Grid 变化</h2>
        <svg id="gridChart" viewBox="0 0 980 230"></svg>
      </section>
      <section class="chart-panel">
        <h2>最终拟合效果</h2>
        <div class="legend" id="fitLegend"></div>
        <svg id="fitChart" viewBox="0 0 980 330"></svg>
      </section>
    </main>

    <aside>
      <section class="panel">
        <h2>事件日志</h2>
        <div id="eventLog"><div class="event">等待训练开始。</div></div>
      </section>
      <section class="panel">
        <h2>历史实验</h2>
        <p class="note">勾选实验后，它的曲线会显示在中间图表中。</p>
        <div id="runList"></div>
      </section>
    </aside>
  </div>
</div>

<script>
const state={healthy:false,activeRun:null,runs:new Map(),selected:new Set(),source:null};
const colors=["#10a37f","#f97316","#4f6bed","#b45309","#7c3aed","#0f766e","#dc2626","#475569"];
const strategyClass={fixed:"fixed",adagrid:"adagrid",ecogrow:"ecogrow"};

function $(id){return document.getElementById(id)}
function fmt(v){return v==null||Number.isNaN(v)?"-":Number(v).toExponential(3)}
async function apiGet(url){const r=await fetch(url);if(!r.ok)throw new Error(await r.text());return r.json()}
async function apiPost(url,payload){const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});if(!r.ok){let msg=await r.text();try{msg=JSON.parse(msg).detail||msg}catch{}throw new Error(msg)}return r.json()}

async function checkHealth(){
  try{
    const h=await apiGet("/api/health");
    state.healthy=h.ok;
    $("startBtn").disabled=!h.ok;
    $("healthBox").innerHTML=`<span class="${h.ok?"ok":"bad"}">${h.ok?"可用":"不可用"}</span><br>Python ${h.python}<br>Torch ${h.torch.available?h.torch.version:"不可用"} / ${h.torch.device}<br>runs 目录：${h.runs_dir_writable?"可写":"不可写"}${h.errors.length?`<br><span class="bad">${h.errors.join("<br>")}</span>`:""}`;
  }catch(e){
    state.healthy=false;$("startBtn").disabled=true;$("healthBox").innerHTML=`<span class="bad">后端不可用</span><br>${e.message}`;
  }
}

function readConfig(){
  const ids=["epochs","seed","noise_std","lr","initial_grid","fixed_grid","max_grid","patience","trial_epochs","weight_decay","min_improvement","min_efficiency"];
  const cfg={strategy:$("strategy").value,train_size:160,val_size:160,test_size:400};
  for(const id of ids){cfg[id]=Number($(id).value)}
  return cfg;
}

async function startRun(){
  $("formError").textContent="";
  $("startBtn").disabled=true;
  try{
    const out=await apiPost("/api/runs",readConfig());
    state.activeRun=out.run_id;
    state.selected.add(out.run_id);
    $("mRun").textContent=out.run_id.split("-").slice(1).join("-");
    connectStream(out.run_id);
  }catch(e){
    $("formError").textContent=e.message;
    $("startBtn").disabled=!state.healthy;
  }
}

function connectStream(runId){
  if(state.source)state.source.close();
  state.source=new EventSource(`/api/runs/${runId}/stream`);
  state.source.addEventListener("metric",ev=>{
    const m=JSON.parse(ev.data);updateMetric(runId,m);
  });
  state.source.addEventListener("event",ev=>{
    addEvent(JSON.parse(ev.data));
  });
  state.source.addEventListener("completed",async ev=>{
    addEvent({type:"completed",epoch:"-",message:"训练完成"});
    state.source.close();state.source=null;state.activeRun=null;$("startBtn").disabled=!state.healthy;
    await loadRuns();await loadRunDetail(runId,true);
  });
  state.source.addEventListener("failed",ev=>{
    const p=JSON.parse(ev.data);addEvent({type:"rejected",epoch:"-",message:p.error||"训练失败"});
    state.source.close();state.source=null;state.activeRun=null;$("startBtn").disabled=!state.healthy;
  });
}

function ensureRun(runId){
  if(!state.runs.has(runId))state.runs.set(runId,{summary:{run_id:runId,status:"running"},config:{},metrics:[],events:[],fit_data:{}});
  return state.runs.get(runId);
}
function updateMetric(runId,m){
  const run=ensureRun(runId);run.metrics.push(m);
  $("mEpoch").textContent=m.epoch;$("mTrain").textContent=fmt(m.train_loss);$("mVal").textContent=fmt(m.val_loss);$("mGrid").textContent=m.grid;$("mParams").textContent=m.params;
  drawAll();
}
function addEvent(e){
  if(e.run_id){const run=ensureRun(e.run_id);run.events.push(e)}
  const box=document.createElement("div");box.className=`event ${e.type||""}`;
  const label=e.message || `Epoch ${e.epoch}: ${e.type} ${e.old_grid??""} ${e.new_grid?`→ ${e.new_grid}`:""}`;
  box.textContent=label;
  const log=$("eventLog");log.prepend(box);while(log.children.length>10)log.removeChild(log.lastChild);
}

async function loadRuns(){
  const data=await apiGet("/api/runs");
  const list=$("runList");list.innerHTML="";
  for(const item of data.runs){
    const row=document.createElement("div");row.className="run-item";
    const checked=state.selected.has(item.run_id)?"checked":"";
    row.innerHTML=`<label><input type="checkbox" data-run="${item.run_id}" ${checked}><div><span class="pill ${strategyClass[item.strategy]||""}">${item.strategy}</span> ${item.run_id}<div class="run-meta">seed=${item.seed??"-"} · grid=${item.final_grid??"-"} · params=${item.params??"-"} · val=${fmt(item.val_mse)}</div></div></label>`;
    list.appendChild(row);
  }
  list.querySelectorAll("input[type=checkbox]").forEach(cb=>{
    cb.onchange=async e=>{
      const id=e.target.dataset.run;
      if(e.target.checked){state.selected.add(id);await loadRunDetail(id,true)}
      else{state.selected.delete(id);drawAll()}
    };
  });
}

async function loadRunDetail(runId,select=false){
  const data=await apiGet(`/api/runs/${runId}`);
  state.runs.set(runId,data);
  if(select)state.selected.add(runId);
  drawAll();
  await loadRuns();
}

function selectedRuns(){return Array.from(state.selected).map(id=>[id,state.runs.get(id)]).filter(([,r])=>r)}
function clearSvg(svg){while(svg.firstChild)svg.removeChild(svg.firstChild)}
function sx(x,min,max,left,right){return left+(x-min)/(max-min||1)*(right-left)}
function sy(y,min,max,top,bottom,log=false){const v=log?Math.log10(Math.max(y,min)):y;const a=log?Math.log10(min):min,b=log?Math.log10(max):max;return bottom-(v-a)/(b-a||1)*(bottom-top)}
function path(points){return points.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")}
function addPath(svg,pts,color,width=2){const el=document.createElementNS("http://www.w3.org/2000/svg","path");el.setAttribute("d",path(pts));el.setAttribute("fill","none");el.setAttribute("stroke",color);el.setAttribute("stroke-width",width);svg.appendChild(el)}
function addText(svg,x,y,t){const el=document.createElementNS("http://www.w3.org/2000/svg","text");el.setAttribute("x",x);el.setAttribute("y",y);el.setAttribute("fill","#6b7280");el.setAttribute("font-size","11");el.textContent=t;svg.appendChild(el)}
function drawAxes(svg,w,h,m){const x=document.createElementNS("http://www.w3.org/2000/svg","line");x.setAttribute("x1",m.l);x.setAttribute("x2",w-m.r);x.setAttribute("y1",h-m.b);x.setAttribute("y2",h-m.b);x.setAttribute("stroke","#cbd3e1");svg.appendChild(x);const y=document.createElementNS("http://www.w3.org/2000/svg","line");y.setAttribute("x1",m.l);y.setAttribute("x2",m.l);y.setAttribute("y1",m.t);y.setAttribute("y2",h-m.b);y.setAttribute("stroke","#cbd3e1");svg.appendChild(y)}

function drawMetricChart(id,key,log=false){
  const svg=$(id),w=980,h=250,m={l:62,r:18,t:16,b:32};clearSvg(svg);drawAxes(svg,w,h,m);
  const runs=selectedRuns();const vals=runs.flatMap(([,r])=>r.metrics.map(x=>x[key]).filter(v=>v>0||!log));if(!vals.length){addText(svg,420,120,"暂无数据");return}
  const maxEpoch=Math.max(...runs.flatMap(([,r])=>r.metrics.map(x=>x.epoch)),1);
  const ymin=log?Math.max(1e-6,Math.min(...vals)*.7):Math.min(0,Math.min(...vals));const ymax=Math.max(...vals)*1.2+1e-12;
  runs.forEach(([runId,r],idx)=>{const c=colors[idx%colors.length];addPath(svg,r.metrics.map(v=>[sx(v.epoch,1,maxEpoch,m.l,w-m.r),sy(v[key],ymin,ymax,m.t,h-m.b,log)]),c,2.2);addText(svg,w-m.r-180,20+idx*15,`${r.summary?.strategy||r.config?.strategy||""} ${runId}`,);});
}
function drawGridChart(){drawMetricChart("gridChart","grid",false)}
function drawFit(){
  const svg=$("fitChart"),w=980,h=330,m={l:52,r:18,t:16,b:34};clearSvg(svg);drawAxes(svg,w,h,m);
  const runs=selectedRuns().filter(([,r])=>r.fit_data&&r.fit_data.x_test);if(!runs.length){addText(svg,420,150,"暂无拟合结果");return}
  const base=runs[0][1].fit_data;const xs=base.x_test,ys=base.y_test;const allY=[...ys,...runs.flatMap(([,r])=>r.fit_data.y_pred||[])];const ymin=Math.min(...allY,-1.5),ymax=Math.max(...allY,1.5);
  (base.x_train||[]).forEach((x,i)=>{const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("cx",sx(x,-1,1,m.l,w-m.r));c.setAttribute("cy",sy(base.y_train[i],ymin,ymax,m.t,h-m.b));c.setAttribute("r",2);c.setAttribute("fill","#9ca3af");c.setAttribute("opacity",".45");svg.appendChild(c)});
  addPath(svg,xs.map((x,i)=>[sx(x,-1,1,m.l,w-m.r),sy(ys[i],ymin,ymax,m.t,h-m.b)]),"#222",2.2);
  $("fitLegend").innerHTML='<span>黑线：真实函数，灰点：训练样本</span>';
  runs.forEach(([runId,r],idx)=>{const c=colors[idx%colors.length];addPath(svg,r.fit_data.x_test.map((x,i)=>[sx(x,-1,1,m.l,w-m.r),sy(r.fit_data.y_pred[i],ymin,ymax,m.t,h-m.b)]),c,2.4);$("fitLegend").innerHTML+=`<span style="color:${c}">● ${r.summary?.strategy||r.config?.strategy} ${runId}</span>`});
}
function drawAll(){drawMetricChart("trainChart","train_loss",true);drawMetricChart("valChart","val_loss",true);drawGridChart();drawFit()}

$("startBtn").onclick=startRun;$("refreshBtn").onclick=async()=>{await loadRuns();drawAll()};
checkHealth().then(loadRuns).then(drawAll);
</script>
</body>
</html>
